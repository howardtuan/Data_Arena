name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: data-arena-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build

    env:
      SERVER_HOST: "140.120.53.252"
      SERVER_USER: "680-9000"
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_PATH: "C:\\Users\\680-9000\\Desktop\\Data_Arena"

    steps:
      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SERVER_SSH_KEY}" ]; then
            echo "::error::Missing GitHub secret: SERVER_SSH_KEY"
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${SERVER_SSH_KEY}" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/data_arena_deploy_key
          chmod 600 ~/.ssh/data_arena_deploy_key

          if ! ssh-keygen -y -f ~/.ssh/data_arena_deploy_key > ~/.ssh/data_arena_deploy_key.pub; then
            echo "::error::SERVER_SSH_KEY is not a valid unencrypted OpenSSH private key. Recreate the secret with the full private key, including BEGIN/END lines."
            exit 1
          fi

          echo "Deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/data_arena_deploy_key.pub

          PORT="${SERVER_PORT:-22}"
          echo "Scanning SSH host key for ${SERVER_HOST}:${PORT}"
          if ! ssh-keyscan -T 15 -p "${PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts; then
            echo "::error::Cannot read SSH host key from ${SERVER_HOST}:${PORT}. Check firewall, SSH server, and SERVER_PORT."
            exit 1
          fi

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail

          PORT="${SERVER_PORT:-22}"

          echo "Testing SSH login to ${SERVER_USER}@${SERVER_HOST}:${PORT}"
          ssh \
            -vv \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o IdentitiesOnly=yes \
            -o PreferredAuthentications=publickey \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/data_arena_deploy_key \
            -p "${PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "powershell -NoProfile -NonInteractive -Command \"Write-Host 'ssh-ok'; whoami\""

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail

          PORT="${SERVER_PORT:-22}"

          cat > deploy.ps1 <<'EOF'
          $ErrorActionPreference = 'Stop'

          $repoPath = '${{ env.DEPLOY_PATH }}'
          $branch = '${{ env.DEPLOY_BRANCH }}'
          $sha = '${{ env.DEPLOY_SHA }}'

          Write-Host "Deploying DataArena"
          Write-Host "Repo path: $repoPath"
          Write-Host "Branch: $branch"
          Write-Host "Commit: $sha"

          if (-not (Test-Path -LiteralPath $repoPath)) {
            throw "Deploy path does not exist: $repoPath"
          }

          Set-Location -LiteralPath $repoPath

          $currentBranch = (git branch --show-current).Trim()
          if ($currentBranch -ne $branch) {
            throw "Server repo is on branch '$currentBranch', but workflow is deploying '$branch'. Switch the server repo branch or adjust the workflow."
          }

          git fetch origin $branch
          git pull --ff-only origin $branch

          docker compose up --build -d
          docker compose ps

          $healthy = $false
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri 'http://localhost:8080/api/health' -TimeoutSec 2
              if ($response.ok -eq $true) {
                Write-Host "Health check passed. Problem count: $($response.problemCount)"
                $healthy = $true
                break
              }
            } catch {
              Start-Sleep -Seconds 2
            }
          }

          if (-not $healthy) {
            docker compose logs --tail 120
            throw "Health check failed after deployment."
          }
          EOF

          ENCODED_SCRIPT="$(iconv -f UTF-8 -t UTF-16LE deploy.ps1 | base64 -w 0)"

          ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o IdentitiesOnly=yes \
            -o PreferredAuthentications=publickey \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=2 \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/data_arena_deploy_key \
            -p "${PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -EncodedCommand ${ENCODED_SCRIPT}"
